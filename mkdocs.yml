site_name: 大模型数据工程：架构、算法及项目实战
site_url: https://datascale-ai.github.io/data_engineering_book/
site_author: ustc
site_description: 大模型数据工程：架构、算法及项目实战

# 仓库信息 (右上角显示 GitHub 图标)
repo_name: GitHub
repo_url: https://github.com/datascale-ai/data_engineering_book/tree/main

theme:
  name: material
  language: zh
  # 禁用默认的 favicon，可以换成自己的 logo
  # logo: assets/logo.png 
  # favicon: assets/favicon.png
  
  # 关键：书籍模式的特性配置
  features:
    - navigation.sections    # 侧边栏按章节分组
    - navigation.expand      # 默认展开所有目录 (像纸质书目录一样一览无余)
    - navigation.indexes     # 允许点击章节标题页
    - navigation.top         # 返回顶部按钮
    - navigation.footer      # 底部显示 [上一章] [下一章] (书籍核心体验)
    - toc.follow             # 右侧小目录随滚动自动高亮
    - search.suggest         # 搜索建议
    - content.code.copy      # 代码块复制按钮

  # 调色盘：提供护眼模式
  palette:
    # 日间模式 (亮色)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white         # 配合 CSS 将顶栏变白，降低干扰
      accent: red            # 链接高亮色 (类似红笔批注)
      toggle:
        icon: material/weather-sunny
        name: 切换至夜间模式
    
    # 夜间模式 (深色)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: 切换至日间模式

# 插件配置
plugins:
  - search                           # 全文搜索 (内置)
  - glightbox                        # 图片点击放大 (书籍中架构图较多，必备)
  # Old chapter slugs (e.g. part4/4_1_SFT) redirect to new (part4/ch12_sft) via
  # a custom hook that writes <meta refresh> stub pages at old locations during build.
  # See scripts/mkdocs_chapter_redirects.py.
  - i18n:
      reconfigure_material: true     # 自动适配 Material 主题
      docs_structure: folder         # 文件夹策略：zh/ 和 en/ 目录
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
          site_name: 大模型数据工程：架构、算法及项目实战
          nav:
            - 目录: index.md
            - 序言: preface.md
            - 第一部分：总论与基础设施:
                - 第1章：大模型时代的数据变革: part1/ch01_data_change.md
                - 第2章：LLM数据生命周期与质量评估框架: part1/ch02_quality_framework.md
                - 第3章：AI原生数据栈与成本治理: part1/ch03_data_stack.md
            - 第二部分：文本预训练数据工程:
                - 第4章：数据源、采集与版权: part2/ch04_data_sources.md
                - 第5章：清洗、去重与去污染: part2/ch05_cleaning_dedup.md
                - 第6章：分词、序列化与高效加载: part2/ch06_tokenization_loading.md
                - 第7章：数据评估、质量闭环与运营迭代: part2/ch07_data_operations.md
            - 第三部分：多模态数据工程:
                - 第8章：图文对数据工程: part3/ch08_multimodal_image.md
                - 第9章：重标注与文档理解: part3/ch09_recaptioning_ocr.md
                - 第10章：视频与音频数据工程: part3/ch10_video_audio.md
                - 第11章：跨模态对齐与融合: part3/ch11_cross_modal_alignment.md
            - 第四部分：指令微调与偏好数据:
                - 第12章：SFT数据设计与指令体系: part4/ch12_sft.md
                - 第13章：偏好数据与奖励信号: part4/ch13_preference.md
                - 第14章：标注平台、QA体系与数据运营: part4/ch14_qa.md
            - 第五部分：合成数据工程:
                - 第15章：合成数据工厂：从种子到验证: part5/ch15_data_synthesis.md
                - 第16章：知识蒸馏与模型协作: part5/ch16_distillation.md
                - 第17章：合成数据质量控制与模型坍缩: part5/ch17_quality.md
            - 第六部分：推理与 Agent 数据工程:
                - 第18章：思维链与推理数据工程: part6/ch18_cot.md
                - 第19章：Tool-Use 与函数调用数据: part6/ch19_tool.md
                - 第20章：Agent 记忆与多轮交互数据: part6/ch20_agent.md
            - 第七部分：应用级数据工程:
                - 第21章：RAG 数据流水线: part7/ch21_rag_pipeline.md
                - 第22章：多模态 RAG 与视觉检索: part7/ch22_multimodal_rag_visual_retrieval.md
                - 第23章：在线反馈闭环与知识更新: part7/ch23_online_feedback_knowledge_update.md
            - 第八部分：数据运营与平台建设:
                - 第24章：DataOps 飞轮与团队组织: part8/ch24_dataops_flywheel_team.md
                - 第25章：数据版本管理与实验追踪: part8/ch25_data_versioning_experiment_tracking.md
                - 第26章：数据平台可观测性: part8/ch26_data_platform_observability.md
            - 第九部分：隐私合规与数据安全:
                - 第27章：数据合规框架与治理: part9/ch27_compliance_framework_and_governance.md
                - 第28章：联邦学习与隐私保护技术: part9/ch28_federated_learning_and_privacy_preserving_technologies.md
            - 第十部分：项目实战:
                - 项目一：基于 Ray 构建分布式 Mini-C4 数据流水线: part10/10_1_mini_c4.md
                - 项目二：垂直领域专家 SFT（法律）: part10/10_2_legal_sft.md
                - 项目三：LLaVA 多模态指令数据工厂: part10/10_3_llava_instruct.md
                - 项目四：合成数学与代码教材工厂: part10/10_4_synthetic_textbook.md
                - 项目五：多模态 RAG 企业财报助手: part10/10_5_mm_rag.md
                - 项目六：CoT 推理数据集构建与 PRM 训练: part10/10_6_PRM.md
                - 项目七：Agent Tool-Use 数据工厂: part10/10_7_Agent_Tooluse.md
                - 项目八：企业级 DataOps 平台搭建：从数据项目到组织级治理能力: part10/10_8_dataops.md
                - 项目九：隐私保护数据流水线: part10/10_9_privacy_pipeline.md
                - 项目十：端到端 LLM 数据飞轮: part10/10_10_flywheel.md
        - locale: en
          name: English
          build: true
          site_name: "Data Engineering for Large Models: Architecture, Algorithms & Projects"
          theme:
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: white
                accent: red
                toggle:
                  icon: material/weather-sunny
                  name: Switch to dark mode
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: red
                toggle:
                  icon: material/weather-night
                  name: Switch to light mode
          nav:
            - Table of Contents: index.md
            - Preface: preface.md
            - Chinese 2026 Edition Status: translation-status.md
        - locale: ja
          name: 日本語
          build: true
          site_name: "大規模モデルデータエンジニアリング: アーキテクチャ・アルゴリズム・実践プロジェクト"
          theme:
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: white
                accent: red
                toggle:
                  icon: material/weather-sunny
                  name: ダークモードに切り替え
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: red
                toggle:
                  icon: material/weather-night
                  name: ライトモードに切り替え
          nav:
            - 目次: index.md
            - 序文: preface.md
            - 中国語2026年版の翻訳状況: translation-status.md

# 构建钩子：旧章节路径生成跳转页（保护外链）
hooks:
  - scripts/mkdocs_chapter_redirects.py

# 必选插件：增强书籍排版能力
markdown_extensions:
  - admonition               # 提示框
  - footnotes                # 脚注
  - attr_list                # 图片/元素属性控制
  - md_in_html               # 支持 HTML 混排
  - pymdownx.details         # 折叠块
  - pymdownx.superfences     # 高级代码块
  - pymdownx.arithmatex:     # 数学公式
      generic: true
  - pymdownx.highlight:      # 代码高亮
      anchor_linenums: true
  - toc:
      permalink: true        # 标题生成锚点链接

# 引入自定义样式
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

