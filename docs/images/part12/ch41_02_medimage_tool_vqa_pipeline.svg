</text>
<text x="385" y="745" font-size="25" font-weight="400" fill="#1f2937">
<tspan x="385" dy="0">证据线：每个问题都应回到某个可检查的局部区域。</tspan>
<tspan x="385" dy="32">行为线：每个工具动作都应解释它解决了哪类视觉不确定性。</tspan>
