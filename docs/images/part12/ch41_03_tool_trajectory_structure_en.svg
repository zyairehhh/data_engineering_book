<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1120" viewBox="0 0 1900 1120" role="img">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f7faff"/>
<g font-family="Arial, Helvetica, sans-serif" fill="#111827">
<text x="72" y="96" font-size="44" font-weight="700" fill="#111827">
<tspan x="72" dy="0">Figure 41-3 Multi-Turn Tool-Call Trajectory Structure</tspan>
</text>
<text x="72" y="140" font-size="24" font-weight="400" fill="#607086">
<tspan x="72" dy="0">Tool observations return as new image inputs, so the dialogue continues after each call</tspan>
</text>
<rect x="80" y="225" width="355" height="450" rx="18" fill="#e8f3ff" stroke="#b9cce2" stroke-width="1.5"/>
<rect x="106" y="249" width="44" height="44" rx="12" fill="#2563eb"/>
<text x="120" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="120" dy="0">1</tspan>
</text>
<text x="170" y="280" font-size="28" font-weight="700" fill="#123b63">
<tspan x="170" dy="0">Task input</tspan>
</text>
<text x="170" y="307" font-size="17" font-weight="400" fill="#607086">
<tspan x="170" dy="0">User message</tspan>
</text>
<circle cx="116" cy="353" r="5" fill="#2563eb"/>
<text x="140" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="140" dy="0">original medical image</tspan>
</text>
<circle cx="116" cy="393" r="5" fill="#2563eb"/>
<text x="140" y="400" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="140" dy="0">question and candidate</tspan>
<tspan x="140" dy="26">options</tspan>
</text>
<circle cx="116" cy="459" r="5" fill="#2563eb"/>
<text x="140" y="466" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="140" dy="0">image index, size, and</tspan>
<tspan x="140" dy="26">region cues</tspan>
</text>
<line x1="450" y1="450" x2="525" y2="450" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="540" y="225" width="355" height="450" rx="18" fill="#ecf8ef" stroke="#b7d2c0" stroke-width="1.5"/>
<rect x="566" y="249" width="44" height="44" rx="12" fill="#16a34a"/>
<text x="580" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="580" dy="0">2</tspan>
</text>
<text x="630" y="280" font-size="28" font-weight="700" fill="#0f5132">
<tspan x="630" dy="0">Decision</tspan>
<tspan x="630" dy="32">action</tspan>
</text>
<text x="630" y="339" font-size="17" font-weight="400" fill="#607086">
<tspan x="630" dy="0">Assistant message</tspan>
</text>
<circle cx="576" cy="353" r="5" fill="#2563eb"/>
<text x="600" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="600" dy="0">judge if whole-image</tspan>
<tspan x="600" dy="26">evidence is enough</tspan>
</text>
<circle cx="576" cy="419" r="5" fill="#2563eb"/>
<text x="600" y="426" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="600" dy="0">choose zoom-in,</tspan>
<tspan x="600" dy="26">segmentation, or direct</tspan>
<tspan x="600" dy="26">answer</tspan>
</text>
<circle cx="576" cy="511" r="5" fill="#2563eb"/>
<text x="600" y="518" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="600" dy="0">emit valid tool name and</tspan>
<tspan x="600" dy="26">JSON arguments</tspan>
</text>
<line x1="910" y1="450" x2="985" y2="450" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="1000" y="225" width="355" height="450" rx="18" fill="#fff0e5" stroke="#e4bf9d" stroke-width="1.5"/>
<rect x="1026" y="249" width="44" height="44" rx="12" fill="#ea580c"/>
<text x="1040" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="1040" dy="0">3</tspan>
</text>
<text x="1090" y="280" font-size="28" font-weight="700" fill="#7a3d00">
<tspan x="1090" dy="0">Observation</tspan>
<tspan x="1090" dy="32">return</tspan>
</text>
<text x="1090" y="339" font-size="17" font-weight="400" fill="#607086">
<tspan x="1090" dy="0">Tool / User message</tspan>
</text>
<circle cx="1036" cy="353" r="5" fill="#2563eb"/>
<text x="1060" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1060" dy="0">return crop, mask</tspan>
<tspan x="1060" dy="26">overlay, or segmentation</tspan>
</text>
<circle cx="1036" cy="419" r="5" fill="#2563eb"/>
<text x="1060" y="426" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1060" dy="0">insert observation into</tspan>
<tspan x="1060" dy="26">the next turn</tspan>
</text>
<circle cx="1036" cy="485" r="5" fill="#2563eb"/>
<text x="1060" y="492" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1060" dy="0">preserve source region</tspan>
<tspan x="1060" dy="26">and tool arguments</tspan>
</text>
<line x1="1370" y1="450" x2="1445" y2="450" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="1460" y="225" width="355" height="450" rx="18" fill="#f0ebff" stroke="#c7bddf" stroke-width="1.5"/>
<rect x="1486" y="249" width="44" height="44" rx="12" fill="#7c3aed"/>
<text x="1500" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="1500" dy="0">4</tspan>
</text>
<text x="1550" y="280" font-size="28" font-weight="700" fill="#3d2476">
<tspan x="1550" dy="0">Reasoning and</tspan>
<tspan x="1550" dy="32">answer</tspan>
</text>
<text x="1550" y="339" font-size="17" font-weight="400" fill="#607086">
<tspan x="1550" dy="0">Assistant message</tspan>
</text>
<circle cx="1496" cy="353" r="5" fill="#2563eb"/>
<text x="1520" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1520" dy="0">consume new observation</tspan>
<tspan x="1520" dy="26">and update judgment</tspan>
</text>
<circle cx="1496" cy="419" r="5" fill="#2563eb"/>
<text x="1520" y="426" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1520" dy="0">call tools again only if</tspan>
<tspan x="1520" dy="26">needed</tspan>
</text>
<circle cx="1496" cy="485" r="5" fill="#2563eb"/>
<text x="1520" y="492" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1520" dy="0">output final option and</tspan>
<tspan x="1520" dy="26">brief reason</tspan>
</text>
<path d="M 1640 675 L 1640 790 L 720 790 L 720 675" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<text x="825" y="835" font-size="22" font-weight="400" fill="#607086">
<tspan x="825" dy="0">If evidence is still insufficient, return to the decision step</tspan>
</text>
<rect x="170" y="925" width="1660" height="115" rx="16" fill="#ffffff" stroke="#b9c8dc" stroke-width="1.5"/>
<text x="210" y="980" font-size="26" font-weight="700" fill="#111827">
<tspan x="210" dy="0">Core constraint</tspan>
</text>
<text x="470" y="968" font-size="23" font-weight="400" fill="#1f2937">
<tspan x="470" dy="0">Tool-returned observations enter the next context turn.</tspan>
<tspan x="470" dy="31">They remain traceable to the final answer.</tspan>
</text>
</g>
</svg>
