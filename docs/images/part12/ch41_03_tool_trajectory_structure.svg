<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1120" viewBox="0 0 1900 1120" role="img">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f7faff"/>
<g font-family="SimSun, Songti SC, Noto Serif CJK SC, serif" fill="#111827">
<text x="72" y="96" font-size="52" font-weight="700" fill="#111827">
<tspan x="72" dy="0">图41-3 工具调用多轮轨迹结构</tspan>
</text>
<text x="72" y="140" font-size="28" font-weight="400" fill="#607086">
<tspan x="72" dy="0">工具观察作为新的图像输入返回，对话继续推进，而不是在一次调用后结束</tspan>
</text>
<rect x="80" y="225" width="355" height="450" rx="18" fill="#e8f3ff" stroke="#b9cce2" stroke-width="1.5"/>
<rect x="106" y="249" width="44" height="44" rx="12" fill="#2563eb"/>
<text x="120" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="120" dy="0">1</tspan>
</text>
<text x="170" y="280" font-size="31" font-weight="700" fill="#123b63">
<tspan x="170" dy="0">任务输入</tspan>
</text>
<text x="170" y="307" font-size="19" font-weight="400" fill="#607086">
<tspan x="170" dy="0">User message</tspan>
</text>
<circle cx="116" cy="353" r="5" fill="#2563eb"/>
<text x="140" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="140" dy="0">原始医学图像</tspan>
</text>
<circle cx="116" cy="393" r="5" fill="#2563eb"/>
<text x="140" y="400" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="140" dy="0">医学图像问题与候选项</tspan>
</text>
<circle cx="116" cy="433" r="5" fill="#2563eb"/>
<text x="140" y="440" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="140" dy="0">图像索引、尺寸和区域线索</tspan>
</text>
<line x1="450" y1="450" x2="525" y2="450" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="540" y="225" width="355" height="450" rx="18" fill="#ecf8ef" stroke="#b7d2c0" stroke-width="1.5"/>
<rect x="566" y="249" width="44" height="44" rx="12" fill="#16a34a"/>
<text x="580" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="580" dy="0">2</tspan>
</text>
<text x="630" y="280" font-size="31" font-weight="700" fill="#0f5132">
<tspan x="630" dy="0">决策动作</tspan>
</text>
<text x="630" y="307" font-size="19" font-weight="400" fill="#607086">
<tspan x="630" dy="0">Assistant message</tspan>
</text>
<circle cx="576" cy="353" r="5" fill="#2563eb"/>
<text x="600" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="600" dy="0">判断全图证据是否足够</tspan>
</text>
<circle cx="576" cy="393" r="5" fill="#2563eb"/>
<text x="600" y="400" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="600" dy="0">选择 Zoom-</tspan>
<tspan x="600" dy="26">in、分割或直接回答</tspan>
</text>
<circle cx="576" cy="459" r="5" fill="#2563eb"/>
<text x="600" y="466" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="600" dy="0">输出合法工具名与 JSON 参数</tspan>
</text>
<line x1="910" y1="450" x2="985" y2="450" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="1000" y="225" width="355" height="450" rx="18" fill="#fff0e5" stroke="#e4bf9d" stroke-width="1.5"/>
<rect x="1026" y="249" width="44" height="44" rx="12" fill="#ea580c"/>
<text x="1040" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="1040" dy="0">3</tspan>
</text>
<text x="1090" y="280" font-size="31" font-weight="700" fill="#7a3d00">
<tspan x="1090" dy="0">观察返回</tspan>
</text>
<text x="1090" y="307" font-size="19" font-weight="400" fill="#607086">
<tspan x="1090" dy="0">Tool / User message</tspan>
</text>
<circle cx="1036" cy="353" r="5" fill="#2563eb"/>
<text x="1060" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1060" dy="0">返回 crop、mask</tspan>
<tspan x="1060" dy="26">overlay 或</tspan>
<tspan x="1060" dy="26">segmentation</tspan>
</text>
<circle cx="1036" cy="445" r="5" fill="#2563eb"/>
<text x="1060" y="452" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1060" dy="0">观察图进入下一轮上下文</tspan>
</text>
<circle cx="1036" cy="485" r="5" fill="#2563eb"/>
<text x="1060" y="492" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1060" dy="0">保留来源区域与工具参数</tspan>
</text>
<line x1="1370" y1="450" x2="1445" y2="450" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="1460" y="225" width="355" height="450" rx="18" fill="#f0ebff" stroke="#c7bddf" stroke-width="1.5"/>
<rect x="1486" y="249" width="44" height="44" rx="12" fill="#7c3aed"/>
<text x="1500" y="280" font-size="24" font-weight="700" fill="#ffffff">
<tspan x="1500" dy="0">4</tspan>
</text>
<text x="1550" y="280" font-size="31" font-weight="700" fill="#3d2476">
<tspan x="1550" dy="0">推理与答案</tspan>
</text>
<text x="1550" y="307" font-size="19" font-weight="400" fill="#607086">
<tspan x="1550" dy="0">Assistant message</tspan>
</text>
<circle cx="1496" cy="353" r="5" fill="#2563eb"/>
<text x="1520" y="360" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1520" dy="0">消费新观察并更新判断</tspan>
</text>
<circle cx="1496" cy="393" r="5" fill="#2563eb"/>
<text x="1520" y="400" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1520" dy="0">必要时再次调用工具</tspan>
</text>
<circle cx="1496" cy="433" r="5" fill="#2563eb"/>
<text x="1520" y="440" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="1520" dy="0">输出最终选项与简短理由</tspan>
</text>
<path d="M 1640 675 L 1640 790 L 720 790 L 720 675" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<text x="825" y="835" font-size="26" font-weight="400" fill="#607086">
<tspan x="825" dy="0">证据仍不足时，回到决策动作继续一轮</tspan>
</text>
<rect x="170" y="925" width="1660" height="115" rx="16" fill="#ffffff" stroke="#b9c8dc" stroke-width="1.5"/>
<text x="210" y="980" font-size="28" font-weight="700" fill="#111827">
<tspan x="210" dy="0">核心约束</tspan>
</text>
<text x="420" y="965" font-size="24" font-weight="400" fill="#1f2937">
<tspan x="420" dy="0">工具返回的图像观察必须进入下一轮上下文，</tspan>
<tspan x="420" dy="32">并与最终答案保持可追踪的证据关系。</tspan>
</text>
</g>
</svg>
