<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1120" viewBox="0 0 2000 1120" role="img">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f7faff"/>
<g font-family="Arial, Helvetica, sans-serif" fill="#111827">
<text x="72" y="96" font-size="44" font-weight="700" fill="#111827">
<tspan x="72" dy="0">Figure 41-4 Quality-Control and Human-Review Gates</tspan>
</text>
<text x="72" y="140" font-size="24" font-weight="400" fill="#607086">
<tspan x="72" dy="0">Automatic gates narrow the error space before high-risk and low-confidence samples enter review</tspan>
</text>
<rect x="90" y="215" width="850" height="505" rx="18" fill="#f4f7fb" stroke="#b9c8dc" stroke-width="1.5"/>
<text x="130" y="282" font-size="30" font-weight="700" fill="#111827">
<tspan x="130" dy="0">Automatic validation gates</tspan>
</text>
<rect x="130" y="315" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="154" y="361" font-size="27" font-weight="700" fill="#123b63">
<tspan x="154" dy="0">Structure check</tspan>
</text>
<circle cx="158" cy="394" r="5" fill="#2563eb"/>
<text x="182" y="401" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">complete fields</tspan>
</text>
<circle cx="158" cy="434" r="5" fill="#2563eb"/>
<text x="182" y="441" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">parseable tool JSON</tspan>
</text>
<rect x="550" y="315" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="574" y="361" font-size="27" font-weight="700" fill="#123b63">
<tspan x="574" dy="0">Image dependency</tspan>
</text>
<circle cx="578" cy="394" r="5" fill="#2563eb"/>
<text x="602" y="401" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">filter text-answerable QA</tspan>
</text>
<circle cx="578" cy="434" r="5" fill="#2563eb"/>
<text x="602" y="441" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">keep visual-evidence QA</tspan>
</text>
<rect x="130" y="505" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="154" y="551" font-size="27" font-weight="700" fill="#123b63">
<tspan x="154" dy="0">Region consistency</tspan>
</text>
<circle cx="158" cy="584" r="5" fill="#2563eb"/>
<text x="182" y="591" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">align question, answer, ROI</tspan>
</text>
<circle cx="158" cy="624" r="5" fill="#2563eb"/>
<text x="182" y="631" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">avoid bbox/mask leakage</tspan>
</text>
<rect x="550" y="505" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="574" y="551" font-size="27" font-weight="700" fill="#123b63">
<tspan x="574" dy="0">Tool validity</tspan>
</text>
<circle cx="578" cy="584" r="5" fill="#2563eb"/>
<text x="602" y="591" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">bbox in bounds</tspan>
</text>
<circle cx="578" cy="624" r="5" fill="#2563eb"/>
<text x="602" y="631" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">observation traceable</tspan>
</text>
<rect x="1060" y="215" width="405" height="505" rx="18" fill="#fff8ec" stroke="#fb923c" stroke-width="1.5"/>
<text x="1100" y="282" font-size="29" font-weight="700" fill="#111827">
<tspan x="1100" dy="0">Human review queue</tspan>
</text>
<rect x="1100" y="320" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="354" font-size="21" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">Confidence conflict</tspan>
</text>
<text x="1120" y="380" font-size="15" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">low score or conflicting checks</tspan>
</text>
<rect x="1100" y="415" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="449" font-size="21" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">High-risk topic</tspan>
</text>
<text x="1120" y="475" font-size="15" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">malignancy, emergency, pediatrics</tspan>
</text>
<rect x="1100" y="510" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="544" font-size="21" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">Region evidence</tspan>
</text>
<text x="1120" y="570" font-size="15" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">weak bbox or mask-target match</tspan>
</text>
<rect x="1100" y="605" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="639" font-size="21" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">Tool-path anomaly</tspan>
</text>
<text x="1120" y="665" font-size="15" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">missing or unused observation</tspan>
</text>
<rect x="1585" y="215" width="325" height="505" rx="18" fill="#ecfdf5" stroke="#6fcf97" stroke-width="1.5"/>
<text x="1625" y="282" font-size="28" font-weight="700" fill="#111827">
<tspan x="1625" dy="0">Result log</tspan>
</text>
<rect x="1625" y="326" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="340" width="70" height="32" rx="12" fill="#16a34a"/>
<text x="1660" y="363" font-size="17" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">Pass</tspan>
</text>
<text x="1730" y="364" font-size="18" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">training set</tspan>
</text>
<rect x="1625" y="416" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="430" width="70" height="32" rx="12" fill="#0ea5e9"/>
<text x="1660" y="453" font-size="17" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">Revise</tspan>
</text>
<text x="1730" y="454" font-size="18" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">regenerate</tspan>
</text>
<rect x="1625" y="506" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="520" width="70" height="32" rx="12" fill="#d18a00"/>
<text x="1660" y="543" font-size="17" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">Shift</tspan>
</text>
<text x="1730" y="544" font-size="18" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">direct VQA</tspan>
</text>
<rect x="1625" y="596" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="610" width="70" height="32" rx="12" fill="#dc2626"/>
<text x="1660" y="633" font-size="17" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">Drop</tspan>
</text>
<text x="1730" y="634" font-size="18" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">record reason</tspan>
</text>
<line x1="940" y1="470" x2="1060" y2="470" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1465" y1="470" x2="1585" y2="470" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1748" y1="720" x2="1748" y2="800" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="140" y="820" width="1720" height="160" rx="16" fill="#ffffff" stroke="#b9c8dc" stroke-width="1.5"/>
<text x="180" y="885" font-size="28" font-weight="700" fill="#111827">
<tspan x="180" dy="0">Version record and data card</tspan>
</text>
<text x="180" y="930" font-size="21" font-weight="400" fill="#1f2937">
<tspan x="180" dy="0">Review conclusions, failure causes, handling actions, and final ownership are written into the dataset version; only</tspan>
<tspan x="180" dy="26">gated samples enter training mixture and release.</tspan>
</text>
<text x="145" y="1060" font-size="20" font-weight="400" fill="#607086">
<tspan x="145" dy="0">Automatic rules scale screening; human review handles high-risk judgment. Together they constrain answers, evidence, and behavior.</tspan>
</text>
</g>
</svg>
