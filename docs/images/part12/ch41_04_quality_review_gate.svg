<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1120" viewBox="0 0 2000 1120" role="img">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f7faff"/>
<g font-family="SimSun, Songti SC, Noto Serif CJK SC, serif" fill="#111827">
<text x="72" y="96" font-size="52" font-weight="700" fill="#111827">
<tspan x="72" dy="0">图41-4 质量控制与人工复核门禁</tspan>
</text>
<text x="72" y="140" font-size="28" font-weight="400" fill="#607086">
<tspan x="72" dy="0">先用自动规则收缩错误空间，再把高风险与低置信样本送入人工复核队列</tspan>
</text>
<rect x="90" y="215" width="850" height="505" rx="18" fill="#f4f7fb" stroke="#b9c8dc" stroke-width="1.5"/>
<text x="130" y="282" font-size="34" font-weight="700" fill="#111827">
<tspan x="130" dy="0">自动校验门禁</tspan>
</text>
<rect x="130" y="315" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="154" y="361" font-size="30" font-weight="700" fill="#123b63">
<tspan x="154" dy="0">结构校验</tspan>
</text>
<circle cx="158" cy="394" r="5" fill="#2563eb"/>
<text x="182" y="401" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">字段完整</tspan>
</text>
<circle cx="158" cy="436" r="5" fill="#2563eb"/>
<text x="182" y="443" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">工具 JSON 可解析</tspan>
</text>
<rect x="550" y="315" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="574" y="361" font-size="30" font-weight="700" fill="#123b63">
<tspan x="574" dy="0">图像依赖</tspan>
</text>
<circle cx="578" cy="394" r="5" fill="#2563eb"/>
<text x="602" y="401" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">过滤文本可答题</tspan>
</text>
<circle cx="578" cy="436" r="5" fill="#2563eb"/>
<text x="602" y="443" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">保留视觉证据题</tspan>
</text>
<rect x="130" y="505" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="154" y="551" font-size="30" font-weight="700" fill="#123b63">
<tspan x="154" dy="0">区域一致</tspan>
</text>
<circle cx="158" cy="584" r="5" fill="#2563eb"/>
<text x="182" y="591" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">问题、答案与 ROI 对齐</tspan>
</text>
<circle cx="158" cy="626" r="5" fill="#2563eb"/>
<text x="182" y="633" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="182" dy="0">避免 bbox/mask 泄漏</tspan>
</text>
<rect x="550" y="505" width="385" height="150" rx="12" fill="#ffffff" stroke="#cbd8e8" stroke-width="1.3"/>
<text x="574" y="551" font-size="30" font-weight="700" fill="#123b63">
<tspan x="574" dy="0">工具有效</tspan>
</text>
<circle cx="578" cy="584" r="5" fill="#2563eb"/>
<text x="602" y="591" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">bbox 不越界</tspan>
</text>
<circle cx="578" cy="626" r="5" fill="#2563eb"/>
<text x="602" y="633" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="602" dy="0">观察图可追踪</tspan>
</text>
<rect x="1060" y="215" width="405" height="505" rx="18" fill="#fff8ec" stroke="#fb923c" stroke-width="1.5"/>
<text x="1100" y="282" font-size="34" font-weight="700" fill="#111827">
<tspan x="1100" dy="0">人工复核队列</tspan>
</text>
<rect x="1100" y="320" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="354" font-size="25" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">低置信或规则冲突</tspan>
</text>
<text x="1120" y="380" font-size="18" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">自动分数低，多项校验互相矛盾</tspan>
</text>
<rect x="1100" y="415" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="449" font-size="25" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">高风险医学主题</tspan>
</text>
<text x="1120" y="475" font-size="18" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">恶性病变、急危重症、儿童影像等</tspan>
</text>
<rect x="1100" y="510" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="544" font-size="25" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">区域证据不稳</tspan>
</text>
<text x="1120" y="570" font-size="18" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">bbox、mask 与题目目标弱一致</tspan>
</text>
<rect x="1100" y="605" width="330" height="74" rx="12" fill="#fffdf8" stroke="#fb923c" stroke-width="1.3"/>
<text x="1120" y="639" font-size="25" font-weight="700" fill="#6d4c00">
<tspan x="1120" dy="0">工具轨迹异常</tspan>
</text>
<text x="1120" y="665" font-size="18" font-weight="400" fill="#6b4a1f">
<tspan x="1120" dy="0">观察缺失、次数异常或未被消费</tspan>
</text>
<rect x="1585" y="215" width="325" height="505" rx="18" fill="#ecfdf5" stroke="#6fcf97" stroke-width="1.5"/>
<text x="1625" y="282" font-size="34" font-weight="700" fill="#111827">
<tspan x="1625" dy="0">结果回写</tspan>
</text>
<rect x="1625" y="326" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="340" width="70" height="32" rx="12" fill="#16a34a"/>
<text x="1660" y="363" font-size="21" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">通过</tspan>
</text>
<text x="1730" y="364" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">进入训练集</tspan>
</text>
<rect x="1625" y="416" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="430" width="70" height="32" rx="12" fill="#0ea5e9"/>
<text x="1660" y="453" font-size="21" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">修改</tspan>
</text>
<text x="1730" y="454" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">回炉重写</tspan>
</text>
<rect x="1625" y="506" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="520" width="70" height="32" rx="12" fill="#d18a00"/>
<text x="1660" y="543" font-size="21" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">降级</tspan>
</text>
<text x="1730" y="544" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">转为直接 VQA</tspan>
</text>
<rect x="1625" y="596" width="250" height="60" rx="11" fill="#ffffff" stroke="#8bd3a8" stroke-width="1.2"/>
<rect x="1645" y="610" width="70" height="32" rx="12" fill="#dc2626"/>
<text x="1660" y="633" font-size="21" font-weight="700" fill="#ffffff">
<tspan x="1660" dy="0">废弃</tspan>
</text>
<text x="1730" y="634" font-size="22" font-weight="400" fill="#1f2937">
<tspan x="1730" dy="0">记录原因并排除</tspan>
</text>
<line x1="940" y1="470" x2="1060" y2="470" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1465" y1="470" x2="1585" y2="470" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1748" y1="720" x2="1748" y2="800" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="140" y="820" width="1720" height="160" rx="16" fill="#ffffff" stroke="#b9c8dc" stroke-width="1.5"/>
<text x="180" y="885" font-size="34" font-weight="700" fill="#111827">
<tspan x="180" dy="0">版本记录与数据卡</tspan>
</text>
<text x="180" y="930" font-size="25" font-weight="400" fill="#1f2937">
<tspan x="180" dy="0">复核结论、失败原因、处理动作和后续归属需要写入数据版本；只有通过门禁的样本才进入训练混合与版本化发布。</tspan>
</text>
<text x="145" y="1060" font-size="24" font-weight="400" fill="#607086">
<tspan x="145" dy="0">自动规则负责规模化筛查，人工复核负责高风险判断；二者共同约束答案、证据和行为。</tspan>
</text>
</g>
</svg>
