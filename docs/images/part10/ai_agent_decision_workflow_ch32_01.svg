    <rect x="370" y="360" width="160" height="110" rx="16" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(450, 400)">
        <path d="M -15 0 C -25 -10 -15 -25 0 -20 C 15 -25 25 -10 15 0 C 25 15 15 25 0 20 C -15 25 -25 15 -15 0 Z" fill="none" stroke="#111827" stroke-width="2" />
        <path d="M 0 -20 L 0 20" stroke="#111827" stroke-width="2" />
        <path d="M -8 -10 Q 0 -5 -8 5 M 8 -10 Q 0 -5 8 5" stroke="#111827" stroke-width="2" fill="none" />
    </g>
    <text x="450" y="440" class="font-sys btn-text-center">Parsing Agent</text>


    <text x="600" y="230" class="font-sys layer-title">Structuring Layer</text>
    <rect x="600" y="250" width="200" height="340" rx="20" fill="#b9d9ff" class="shadow-light" />

    <rect x="620" y="270" width="160" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(640, 290)">
        <line x1="20" y1="0" x2="10" y2="15" stroke="#111827" stroke-width="2" />
        <polygon points="10,15 16,25 0,25 4,15" fill="none" stroke="#111827" stroke-width="2" />
        <line x1="4" y1="15" x2="0" y2="25" stroke="#111827" stroke-width="1" />
        <line x1="7" y1="15" x2="5" y2="25" stroke="#111827" stroke-width="1" />
        <line x1="10" y1="15" x2="10" y2="25" stroke="#111827" stroke-width="1" />
    </g>
    <text x="725" y="298" class="font-sys btn-text-center">Cleaning</text>
    <text x="725" y="318" class="font-sys btn-text-center">Agent</text>

    <line x1="700" y1="335" x2="700" y2="365" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />

    <rect x="620" y="370" width="160" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <text x="700" y="398" class="font-sys btn-text-center">Quality</text>
    <text x="700" y="418" class="font-sys btn-text-center">Filter Agent</text>

    <line x1="700" y1="435" x2="700" y2="465" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />

    <rect x="660" y="470" width="80" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(700, 502)">
