<svg viewBox="0 0 1100 800" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .font-sys { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
            .layer-title { font-size: 16px; font-weight: bold; fill: #111827; }
            .layer-title-inside { font-size: 16px; font-weight: bold; fill: #111827; text-anchor: middle; }
            .btn-text { font-size: 15px; font-weight: 500; fill: #111827; }
            .btn-text-center { font-size: 15px; font-weight: 500; fill: #111827; text-anchor: middle; }
            .diamond-text { font-size: 15px; font-weight: bold; fill: #111827; text-anchor: middle; }
            .label-text { font-size: 14px; font-weight: bold; fill: #111827; text-anchor: middle; }
            
            /* Shadows */
            .shadow-light { filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.08)); }
            .shadow-heavy { filter: drop-shadow(0px 6px 12px rgba(0, 0, 0, 0.15)); }
        </style>

        <marker id="arrow-main" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827" />
        </marker>
    </defs>

    <rect width="1100" height="800" fill="#fafafa" />

    <path d="M 900 110 L 900 60 L 175 60 L 175 145" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    
    <path d="M 830 680 L 175 680 L 175 635" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />


    <rect x="50" y="150" width="250" height="480" rx="20" fill="#b9d9ff" class="shadow-light" />
    <text x="175" y="190" class="font-sys layer-title-inside">Connection Layer</text>

    <rect x="70" y="220" width="210" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(90, 240)">
        <line x1="5" y1="5" x2="20" y2="20" stroke="#111827" stroke-width="2" />
        <line x1="5" y1="20" x2="20" y2="5" stroke="#111827" stroke-width="2" />
        <circle cx="5" cy="5" r="3" fill="#111827" />
        <circle cx="20" cy="20" r="3" fill="#111827" />
        <circle cx="5" cy="20" r="3" fill="#111827" />
        <line x1="5" y1="5" x2="5" y2="20" stroke="#111827" stroke-width="2" />
    </g>
    <text x="135" y="258" class="font-sys btn-text">Git Cloner</text>

    <rect x="70" y="310" width="210" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <path d="M 95 348 C 95 340 102 335 108 338 C 112 332 122 332 125 340 C 128 338 133 340 133 345 C 133 352 125 355 115 355 C 105 355 95 353 95 348 Z" fill="none" stroke="#111827" stroke-width="2" />
    <text x="135" y="348" class="font-sys btn-text">API Client</text>

    <rect x="70" y="400" width="210" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(95, 415)">
        <rect x="0" y="0" width="20" height="26" fill="none" stroke="#111827" stroke-width="2" rx="2" />
        <line x1="4" y1="6" x2="16" y2="6" stroke="#111827" stroke-width="2" />
        <line x1="4" y1="12" x2="16" y2="12" stroke="#111827" stroke-width="2" />
        <line x1="4" y1="18" x2="12" y2="18" stroke="#111827" stroke-width="2" />
    </g>
    <text x="135" y="438" class="font-sys btn-text">PDF Reader</text>

    <rect x="70" y="490" width="210" height="65" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(105, 522)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#111827" stroke-width="2" />
        <circle cx="0" cy="0" r="4" fill="none" stroke="#111827" stroke-width="2" />
        <line x1="-14" y1="0" x2="14" y2="0" stroke="#111827" stroke-width="2" />
        <line x1="0" y1="-14" x2="0" y2="14" stroke="#111827" stroke-width="2" />
        <line x1="-10" y1="-10" x2="10" y2="10" stroke="#111827" stroke-width="2" />
        <line x1="-10" y1="10" x2="10" y2="-10" stroke="#111827" stroke-width="2" />
    </g>
    <text x="135" y="528" class="font-sys btn-text">Web Crawler</text>


