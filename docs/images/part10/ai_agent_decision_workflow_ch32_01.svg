        <polyline points="-5,5 0,10 6,0" fill="none" stroke="#111827" stroke-width="2" />
    </g>


    <polygon points="900,350 975,402.5 900,455 825,402.5" fill="#c3f4c6" class="shadow-heavy" />
    <text x="900" y="398" class="font-sys diamond-text">Human</text>
    <text x="900" y="418" class="font-sys diamond-text">Review?</text>

    <rect x="830" y="110" width="140" height="80" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(855, 140)">
        <ellipse cx="10" cy="5" rx="10" ry="4" fill="none" stroke="#111827" stroke-width="2" />
        <path d="M 0 5 L 0 25 A 10 4 0 0 0 20 25 L 20 5" fill="none" stroke="#111827" stroke-width="2" />
        <path d="M 0 15 A 10 4 0 0 0 20 15" fill="none" stroke="#111827" stroke-width="2" />
    </g>
    <text x="930" y="145" class="font-sys btn-text-center">Data Lake/</text>
    <text x="930" y="165" class="font-sys btn-text-center">Warehouse</text>

    <rect x="830" y="640" width="140" height="80" rx="12" fill="#c3f4c6" class="shadow-heavy" />
    <g transform="translate(860, 665)">
        <rect x="-8" y="-12" width="16" height="24" rx="2" fill="none" stroke="#111827" stroke-width="2" />
        <rect x="-3" y="-15" width="6" height="3" fill="#111827" />
        <circle cx="0" cy="-3" r="3" fill="#111827" />
        <path d="M -5 8 C -5 5 5 5 5 8" fill="none" stroke="#111827" stroke-width="2" />
    </g>
    <text x="925" y="665" class="font-sys btn-text-center">Human</text>
    <text x="925" y="685" class="font-sys btn-text-center">Review</text>
    <text x="925" y="705" class="font-sys btn-text-center">Queue</text>


    <path d="M 280 252.5 L 370 415" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    <path d="M 280 342.5 L 370 415" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    <path d="M 280 432.5 L 370 415" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    <path d="M 280 522.5 L 370 415" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />

    <path d="M 530 415 L 600 415" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />

    <path d="M 780 402.5 L 825 402.5" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    <text x="802.5" y="392.5" class="font-sys label-text">No</text>

    <path d="M 975 402.5 L 1020 402.5 L 1020 150 L 970 150" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    <text x="997.5" y="392.5" class="font-sys label-text">No</text>

    <path d="M 900 455 L 900 640" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-main)" />
    <text x="915" y="555" class="font-sys label-text">Yes</text>

</svg>
