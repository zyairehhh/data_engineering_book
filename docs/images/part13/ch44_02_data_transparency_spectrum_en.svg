<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <!-- Title -->
    <text x="450" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="middle">Figure 44-2: Data Transparency Spectrum</text>

    <!-- Spectrum Arrow -->
    <defs>
        <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue for open -->
            <stop offset="50%" stop-color="#94a3b8" /> <!-- Grey for partial -->
            <stop offset="100%" stop-color="#0f172a" /> <!-- Dark for closed -->
        </linearGradient>
        <marker id="arrowhead" markerWidth="24" markerHeight="16" refX="22" refY="8" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0, 24 8, 0 16" fill="#0f172a" />
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#cbd5e1" flood-opacity="0.5"/>
        </filter>
    </defs>

    <line x1="50" y1="90" x2="850" y2="90" stroke="url(#spectrumGrad)" stroke-width="8" marker-end="url(#arrowhead)"/>
    
    <!-- Spectrum Labels -->
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="start">High Transparency</text>
    <text x="850" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="end">Low Transparency</text>

    <!-- Box 1: White-box -->
    <rect x="30" y="120" width="260" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="30" y="120" width="260" height="50" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="30" y="150" width="260" height="20" fill="#f8fafc" /> <!-- Cover bottom radius of header -->
    <line x1="30" y1="170" x2="290" y2="170" stroke="#cbd5e1" stroke-width="2"/>
    <text x="160" y="148" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">White-Box</text>
    <text x="160" y="195" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#64748b" text-anchor="middle">Full Transparency</text>
    
    <g font-family="Arial, sans-serif" font-size="14" fill="#334155">
        <text x="50" y="230">• Exact data sources &amp; dumps</text>
        <text x="50" y="255">• Precise mixture ratios</text>
        <text x="50" y="280">• Open-sourced cleaning scripts</text>
        <text x="50" y="305">• Direct data download</text>
    </g>
    <text x="50" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6">Ex:</text>
    <text x="80" y="350" font-family="Arial, sans-serif" font-size="14" fill="#64748b">OLMo, Amber</text>

    <!-- Box 2: Grey-box -->
    <rect x="320" y="120" width="260" height="260" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
    <rect x="320" y="120" width="260" height="50" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <rect x="320" y="150" width="260" height="20" fill="#e2e8f0" />
    <line x1="320" y1="170" x2="580" y2="170" stroke="#94a3b8" stroke-width="2"/>
    <text x="450" y="148" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Grey-Box</text>
    <text x="450" y="195" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#64748b" text-anchor="middle">Partial Transparency</text>
    
    <g font-family="Arial, sans-serif" font-size="14" fill="#334155">
        <text x="340" y="230">• Macro categories disclosed</text>
        <text x="340" y="255">• Relative proportions provided</text>
        <text x="340" y="280" fill="#dc2626">• NO cleaning code provided</text>
        <text x="340" y="305" fill="#dc2626">• NO data download</text>
    </g>
    <text x="340" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6">Ex:</text>
    <text x="370" y="350" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Llama-3, Qwen2.5, DeepSeek</text>

    <!-- Box 3: Black-box -->
    <rect x="610" y="120" width="260" height="260" rx="12" fill="#1e293b" stroke="#0f172a" stroke-width="2" filter="url(#shadow)"/>
    <rect x="610" y="120" width="260" height="50" rx="12" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
    <rect x="610" y="150" width="260" height="20" fill="#0f172a" />
    <line x1="610" y1="170" x2="870" y2="170" stroke="#334155" stroke-width="2"/>
    <text x="740" y="148" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">Black-Box</text>
    <text x="740" y="195" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#94a3b8" text-anchor="middle">Closed Source</text>
    
    <g font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">
        <text x="630" y="230">• Vague "high-quality" claims</text>
        <text x="630" y="255" fill="#f87171">• NO exact ratios</text>
        <text x="630" y="280" fill="#f87171">• NO sources or code</text>
        <text x="630" y="305" fill="#f87171">• Low engineering value</text>
    </g>
    <text x="630" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6">Ex:</text>
    <text x="660" y="350" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Closed API Models</text>

</svg>
