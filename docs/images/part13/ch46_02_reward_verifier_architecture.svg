<svg viewBox="0 0 1300 700" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .font-sys { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
            .title-text { font-size: 16px; font-weight: bold; fill: #111827; text-anchor: middle; }
            .box-title { font-size: 16px; font-weight: bold; fill: #111827; }
            .main-text { font-size: 14px; fill: #1f2937; }
            .bold-text { font-size: 14px; font-weight: bold; fill: #111827; }
            .small-text { font-size: 13px; fill: #4b5563; text-anchor: middle; }
            .mono-text { font-family: monospace; font-size: 16px; fill: #111827; text-anchor: middle;}
            .table-head { font-size: 15px; font-weight: bold; fill: #111827; text-anchor: middle; }
            .table-cell { font-size: 14px; fill: #374151; }
            
            /* Shadows for depth */
            .shadow { filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.05)); }
        </style>

        <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827" />
        </marker>
    </defs>

    <rect width="1300" height="700" fill="#ffffff" />

    <rect x="40" y="220" width="160" height="200" fill="#f3f4f6" stroke="#374151" stroke-width="2" rx="8" class="shadow"/>
    <text x="120" y="250" class="title-text">Model Output</text>
    
    <rect x="55" y="270" width="130" height="130" fill="#ffffff" stroke="#111827" stroke-width="3" />
    <text x="120" y="300" class="mono-text" text-anchor="start" font-size="14">&lt;think&gt;...</text>
    <text x="120" y="330" class="mono-text" text-anchor="start" font-size="14">...</text>
    <text x="120" y="360" class="mono-text" text-anchor="start" font-size="14">&lt;answer&gt;...</text>
    <text x="120" y="380" class="mono-text" text-anchor="start" font-size="14">...</text>

    <rect x="300" y="30" width="660" height="150" fill="#f8fafc" stroke="#374151" stroke-width="2" rx="8" />
    <text x="630" y="60" class="title-text">Rule-based Reward (Hard Verification Layer)</text>

    <rect x="320" y="75" width="160" height="75" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6" />
    <text x="400" y="95" class="bold-text" text-anchor="middle">Extractor</text>
    <text x="400" y="130" class="mono-text" font-size="22" font-weight="bold">{regex}</text>

    <path d="M 480 112.5 L 510 112.5" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)" />

    <rect x="520" y="75" width="420" height="75" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6" />
    <text x="730" y="95" class="bold-text" text-anchor="middle">Validator</text>
    
    <rect x="560" y="105" width="20" height="25" fill="#374151" rx="2"/>
    <rect x="564" y="108" width="12" height="6" fill="#e5e7eb" />
    <circle cx="566" cy="118" r="1.5" fill="#e5e7eb"/> <circle cx="570" cy="118" r="1.5" fill="#e5e7eb"/> <circle cx="574" cy="118" r="1.5" fill="#e5e7eb"/>
    <circle cx="566" cy="122" r="1.5" fill="#e5e7eb"/> <circle cx="570" cy="122" r="1.5" fill="#e5e7eb"/> <circle cx="574" cy="122" r="1.5" fill="#e5e7eb"/>
    <circle cx="566" cy="126" r="1.5" fill="#e5e7eb"/> <circle cx="570" cy="126" r="1.5" fill="#e5e7eb"/> <circle cx="574" cy="126" r="1.5" fill="#e5e7eb"/>
    <text x="570" y="145" class="small-text">Math (Sympy)</text>

    <rect x="710" y="105" width="24" height="24" fill="none" stroke="#374151" stroke-width="2" rx="2"/>
    <text x="722" y="122" class="mono-text" font-size="12" font-weight="bold">&lt;/&gt;</text>
    <text x="722" y="145" class="small-text">Code (Unit Test)</text>

    <path d="M 865 105 L 875 105 L 880 110 L 880 130 L 865 130 Z" fill="none" stroke="#374151" stroke-width="2" />
    <path d="M 875 105 L 875 110 L 880 110" fill="none" stroke="#374151" stroke-width="2" />
    <text x="872.5" y="123" class="mono-text" font-size="12" font-weight="bold">{}</text>
    <text x="872.5" y="145" class="small-text">Format (JSON/XML)</text>

    <text x="630" y="170" class="main-text" text-anchor="middle">Features: High reliability, low cost, strong determinism</text>

    <rect x="300" y="210" width="660" height="150" fill="#f8fafc" stroke="#374151" stroke-width="2" rx="8" />
    <text x="630" y="240" class="title-text">Model-based Reward (Soft Semantic Layer)</text>

    <g transform="translate(380, 260)">
        <rect x="10" y="10" width="24" height="20" fill="#374151" rx="4"/>
        <circle cx="16" cy="18" r="2" fill="#fff"/>
        <circle cx="28" cy="18" r="2" fill="#fff"/>
        <path d="M 16 25 L 28 25" stroke="#fff" stroke-width="2"/>
        <line x1="22" y1="10" x2="22" y2="4" stroke="#374151" stroke-width="2"/>
        <circle cx="22" cy="2" r="2" fill="#374151"/>
    </g>
    <text x="402" y="305" class="bold-text" text-anchor="middle">Judge Model</text>
    <text x="402" y="325" class="small-text">(LLM-as-a-Judge)</text>

    <rect x="490" y="260" width="450" height="65" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6" />
    <text x="715" y="282" class="main-text" text-anchor="middle">Prompt, Model Response, Reference Answer</text>
    <text x="715" y="308" class="main-text" text-anchor="middle">Eval Items: Helpfulness, Hallucination, Tone, Logic</text>

    <text x="630" y="350" class="main-text" text-anchor="middle">Features: Broad coverage, high flexibility (beware length bias &amp; reward hacking)</text>

    <rect x="300" y="390" width="660" height="120" fill="#f8fafc" stroke="#374151" stroke-width="2" rx="8" />
    <text x="630" y="420" class="title-text">Human Audit (Human Review Layer)</text>

    <rect x="440" y="440" width="380" height="40" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="20" />
    <circle cx="470" cy="456" r="6" fill="none" stroke="#374151" stroke-width="2"/>
    <line x1="474" y1="460" x2="480" y2="466" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    
    <text x="630" y="465" class="bold-text" text-anchor="middle">Controversial Sample Extraction (Controversial Samples)</text>

    <text x="630" y="500" class="main-text" text-anchor="middle">Function: Ground Truth final defense line, calibrate reward model, fix verifier loopholes</text>

    <rect x="1100" y="210" width="160" height="150" fill="#f3f4f6" stroke="#374151" stroke-width="2" rx="8" class="shadow"/>
    <text x="1180" y="240" class="title-text">Final Reward Signal</text>

    <path d="M 1140 280 L 1140 310 M 1140 280 L 1135 285 M 1140 280 L 1145 285" fill="none" stroke="#111827" stroke-width="2" />
    <path d="M 1150 280 L 1150 310 M 1150 310 L 1145 305 M 1150 310 L 1155 305" fill="none" stroke="#111827" stroke-width="2" />
    
    <text x="1150" y="295" class="bold-text">RL Algorithm</text>
    <text x="1180" y="340" class="main-text" text-anchor="middle">e.g., 0.9</text>


    <path d="M 200 320 L 260 320 L 260 105 L 300 105" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)"/>
    <path d="M 260 320 L 300 320" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)"/>
    <path d="M 260 320 L 260 450 L 300 450" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)"/>

    <path d="M 960 105 L 1030 105 L 1030 250 L 1100 250" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)"/>
    <text x="1030" y="160" class="main-text" text-anchor="middle">Deterministic Score</text>

    <path d="M 960 285 L 1100 285" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)"/>
    <text x="1030" y="275" class="main-text" text-anchor="middle">Probability Score</text>
    <text x="1030" y="295" class="small-text">(Reward Model)</text>

    <path d="M 960 450 L 1030 450 L 1030 320 L 1100 320" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)"/>
    <text x="1030" y="440" class="main-text" text-anchor="middle">Calibration Signal</text>


    <text x="90" y="605" class="title-text" text-anchor="start">Data Record Structure</text>

    <g transform="translate(200, 560)">
        <rect x="0" y="0" width="1060" height="40" fill="#f3f4f6" stroke="#374151" stroke-width="1.5" />
        <rect x="0" y="40" width="1060" height="40" fill="#ffffff" stroke="#374151" stroke-width="1.5" />
        
        <line x1="80" y1="0" x2="80" y2="80" stroke="#374151" stroke-width="1.5" />
        <line x1="220" y1="0" x2="220" y2="80" stroke="#374151" stroke-width="1.5" />
        <line x1="320" y1="0" x2="320" y2="80" stroke="#374151" stroke-width="1.5" />
        <line x1="820" y1="0" x2="820" y2="80" stroke="#374151" stroke-width="1.5" />

        <text x="40" y="25" class="table-head">Score</text>
        <text x="150" y="25" class="table-head">Source</text>
        <text x="270" y="25" class="table-head">Pass/Fail</text>
        <text x="570" y="25" class="table-head">Reason</text>
        <text x="940" y="25" class="table-head">Metadata</text>

        <text x="40" y="65" class="table-cell" text-anchor="middle">0.9</text>
        <text x="150" y="65" class="table-cell" text-anchor="middle">Rule: Sympy</text>
        <text x="270" y="65" class="table-cell" text-anchor="middle" fill="#059669" font-weight="bold">PASS</text>
        <text x="330" y="65" class="table-cell" text-anchor="start">Expression simplified and matched GT.</text>
        <text x="940" y="65" class="table-cell" text-anchor="middle">Verifier version, runtime</text>
    </g>

</svg>
