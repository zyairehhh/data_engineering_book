<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" width="800" height="750">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C6B7B" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <!-- Titles -->
    <g font-family="Arial, sans-serif" font-size="28" fill="#000000" text-anchor="middle">
        <text x="230" y="45">Dynamic Hi-Res</text>
        <text x="230" y="80">Patching</text>
        <text x="570" y="45">Native Resolution</text>
        <text x="570" y="80">(M-RoPE)</text>
    </g>

    <!-- Left Column Boxes (Dynamic Hi-Res) -->
    <rect x="120" y="120" width="220" height="70" rx="8" fill="#FDEBCC" stroke="#F0CBA0" stroke-width="2" />
    <rect x="120" y="220" width="220" height="70" rx="8" fill="#FDEBCC" stroke="#F0CBA0" stroke-width="2" />
    <rect x="120" y="320" width="220" height="70" rx="8" fill="#FDEBCC" stroke="#F0CBA0" stroke-width="2" />
    <rect x="120" y="420" width="220" height="70" rx="8" fill="#FDEBCC" stroke="#F0CBA0" stroke-width="2" />
    <rect x="120" y="520" width="220" height="70" rx="8" fill="#FDEBCC" stroke="#F0CBA0" stroke-width="2" />

    <!-- Right Column Boxes (Native Resolution) -->
    <rect x="460" y="120" width="220" height="70" rx="8" fill="#E2D4F6" stroke="#C9AEEF" stroke-width="2" />
    <rect x="460" y="220" width="220" height="70" rx="8" fill="#E2D4F6" stroke="#C9AEEF" stroke-width="2" />
    <rect x="460" y="320" width="220" height="70" rx="8" fill="#E2D4F6" stroke="#C9AEEF" stroke-width="2" />
    <rect x="460" y="420" width="220" height="70" rx="8" fill="#E2D4F6" stroke="#C9AEEF" stroke-width="2" />
    <rect x="460" y="520" width="220" height="70" rx="8" fill="#E2D4F6" stroke="#C9AEEF" stroke-width="2" />

    <!-- Left Arrows -->
    <line x1="230" y1="190" x2="230" y2="216" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="230" y1="290" x2="230" y2="316" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="230" y1="390" x2="230" y2="416" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="230" y1="490" x2="230" y2="516" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Right Arrows -->
    <line x1="570" y1="190" x2="570" y2="216" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="570" y1="290" x2="570" y2="316" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="570" y1="390" x2="570" y2="416" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="570" y1="490" x2="570" y2="516" stroke="#5C6B7B" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Box Text -->
    <g font-family="Arial, sans-serif" font-size="20" fill="#000000" text-anchor="middle">
        <!-- Left Column Text -->
        <text x="230" y="150">Input Image</text>
        <text x="230" y="176">(High Res)</text>
        
        <text x="230" y="250">Dynamic Crop</text>
        <text x="230" y="276">(N patches)</text>
        
        <text x="230" y="350">ViT Encoding</text>
        <text x="230" y="376">(fixed size)</text>
        
        <text x="230" y="450">Token Sequence</text>
        <text x="230" y="476">(Linear)</text>
        
        <text x="230" y="563">LLM Processing</text>

        <!-- Right Column Text -->
        <text x="570" y="150">Input Image</text>
        <text x="570" y="176">(Original res)</text>
        
        <text x="570" y="250">M-RoPE Encoding</text>
        <text x="570" y="276">(2D coords)</text>
        
        <text x="570" y="350">ViT Processing</text>
        <text x="570" y="376">(Dynamic tokens)</text>
        
        <text x="570" y="463">Token-aware Pack</text>
        
        <text x="570" y="550">LLM Processing</text>
        <text x="570" y="576">(Seamless)</text>
    </g>

    <!-- Bottom Boxes -->
    <rect x="70" y="615" width="320" height="90" rx="8" fill="#FDEBCC" />
    <rect x="410" y="615" width="320" height="90" rx="8" fill="#E2D4F6" />

    <!-- Bottom Text -->
    <g font-family="Arial, sans-serif" font-size="20" fill="#000000">
        <!-- Left Bottom -->
        <text x="85" y="650"><tspan font-weight="bold">Pros:</tspan> Simple, reuse encoders</text>
        <text x="85" y="685"><tspan font-weight="bold">Cons:</tspan> Border semantic breaks</text>

        <!-- Right Bottom -->
        <text x="425" y="643"><tspan font-weight="bold">Pros:</tspan> No border breaks, Best</text>
        <text x="485" y="669">accuracy</text>
        <text x="425" y="695"><tspan font-weight="bold">Cons:</tspan> Complex pipeline</text>
    </g>
</svg>
