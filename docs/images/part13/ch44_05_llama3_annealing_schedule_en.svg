<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
    <!-- Definitions -->
    <defs>
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#cbd5e1" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <!-- Title -->
    <text x="500" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#334155" text-anchor="middle">Figure 44-4: Dynamic Data Mixture Schedule (Curriculum Learning)</text>

    <!-- Plot Area Background -->
    <rect x="80" y="80" width="670" height="460" fill="#f8fafc" />

    <!-- Grid lines -->
    <line x1="80" y1="448" x2="750" y2="448" stroke="#e2e8f0" stroke-width="1" />
    <line x1="80" y1="356" x2="750" y2="356" stroke="#e2e8f0" stroke-width="1" />
    <line x1="80" y1="264" x2="750" y2="264" stroke="#e2e8f0" stroke-width="1" />
    <line x1="80" y1="172" x2="750" y2="172" stroke="#e2e8f0" stroke-width="1" />
    <line x1="80" y1="80" x2="750" y2="80" stroke="#e2e8f0" stroke-width="1" />

    <!-- Connecting Curves (Bands) -->
    <g opacity="0.45">
        <!-- P1 to P2 -->
        <!-- Web -->
        <path d="M 230 540 L 230 195 C 292 195, 323 287, 385 287 L 385 540 Z" fill="#BDE0FE" />
        <!-- Code -->
        <path d="M 230 195 L 230 126 C 292 126, 323 195, 385 195 L 385 287 C 323 287, 292 195, 230 195 Z" fill="#FDD089" />
        <!-- Math -->
        <path d="M 230 126 L 230 80 C 292 80, 323 126, 385 126 L 385 195 C 323 195, 292 126, 230 126 Z" fill="#A7E1C0" />
        <!-- Syn -->
        <path d="M 230 80 L 230 80 C 292 80, 323 80, 385 80 L 385 126 C 323 126, 292 80, 230 80 Z" fill="#E3D5F5" />

        <!-- P2 to P3 -->
        <!-- Web -->
        <path d="M 445 540 L 445 287 C 507 287, 538 402, 600 402 L 600 540 Z" fill="#BDE0FE" />
        <!-- Code -->
        <path d="M 445 287 L 445 195 C 507 195, 538 310, 600 310 L 600 402 C 538 402, 507 287, 445 287 Z" fill="#FDD089" />
        <!-- Math -->
        <path d="M 445 195 L 445 126 C 507 126, 538 195, 600 195 L 600 310 C 538 310, 507 195, 445 195 Z" fill="#A7E1C0" />
        <!-- Syn -->
        <path d="M 445 126 L 445 80 C 507 80, 538 80, 600 80 L 600 195 C 538 195, 507 126, 445 126 Z" fill="#E3D5F5" />
    </g>

    <!-- Bars -->
    <!-- Early Pre-training -->
    <rect x="170" y="195" width="60" height="345" fill="#BDE0FE" stroke="#60A5FA" stroke-width="1.5" />
    <rect x="170" y="126" width="60" height="69" fill="#FDD089" stroke="#F59E0B" stroke-width="1.5" />
    <rect x="170" y="80" width="60" height="46" fill="#A7E1C0" stroke="#34D399" stroke-width="1.5" />

    <!-- Mid Pre-training -->
    <rect x="385" y="287" width="60" height="253" fill="#BDE0FE" stroke="#60A5FA" stroke-width="1.5" />
    <rect x="385" y="195" width="60" height="92" fill="#FDD089" stroke="#F59E0B" stroke-width="1.5" />
    <rect x="385" y="126" width="60" height="69" fill="#A7E1C0" stroke="#34D399" stroke-width="1.5" />
    <rect x="385" y="80" width="60" height="46" fill="#E3D5F5" stroke="#A78BFA" stroke-width="1.5" />

    <!-- Annealing Phase -->
    <rect x="600" y="402" width="60" height="138" fill="#BDE0FE" stroke="#60A5FA" stroke-width="1.5" />
    <rect x="600" y="310" width="60" height="92" fill="#FDD089" stroke="#F59E0B" stroke-width="1.5" />
    <rect x="600" y="195" width="60" height="115" fill="#A7E1C0" stroke="#34D399" stroke-width="1.5" />
    <rect x="600" y="80" width="60" height="115" fill="#E3D5F5" stroke="#A78BFA" stroke-width="1.5" />

    <!-- Percentage Texts -->
    <g font-family="Arial, sans-serif" font-size="14" fill="#334155" text-anchor="middle">
        <!-- Early -->
        <text x="200" y="367.5" dy="5">75%</text>
        <text x="200" y="160.5" dy="5">15%</text>
        <text x="200" y="103" dy="5">10%</text>

        <!-- Mid -->
        <text x="415" y="413.5" dy="5">55%</text>
        <text x="415" y="241" dy="5">20%</text>
        <text x="415" y="160.5" dy="5">15%</text>
        <text x="415" y="103" dy="5">10%</text>

        <!-- Anneal -->
        <text x="630" y="471" dy="5">30%</text>
        <text x="630" y="356" dy="5">20%</text>
        <text x="630" y="252.5" dy="5">25%</text>
        <text x="630" y="137.5" dy="5">25%</text>
    </g>

    <!-- Axes -->
    <line x1="80" y1="540" x2="80" y2="80" stroke="#94a3b8" stroke-width="1.5" />
    <line x1="80" y1="540" x2="750" y2="540" stroke="#94a3b8" stroke-width="1.5" />

    <!-- Y-axis Ticks & Labels -->
    <g font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="end">
        <line x1="75" y1="540" x2="80" y2="540" stroke="#94a3b8" stroke-width="1.5" />
        <text x="65" y="540" dy="4">0</text>
        
        <line x1="75" y1="448" x2="80" y2="448" stroke="#94a3b8" stroke-width="1.5" />
        <text x="65" y="448" dy="4">20</text>
        
        <line x1="75" y1="356" x2="80" y2="356" stroke="#94a3b8" stroke-width="1.5" />
        <text x="65" y="356" dy="4">40</text>
        
        <line x1="75" y1="264" x2="80" y2="264" stroke="#94a3b8" stroke-width="1.5" />
        <text x="65" y="264" dy="4">60</text>
        
        <line x1="75" y1="172" x2="80" y2="172" stroke="#94a3b8" stroke-width="1.5" />
        <text x="65" y="172" dy="4">80</text>
        
        <line x1="75" y1="80" x2="80" y2="80" stroke="#94a3b8" stroke-width="1.5" />
        <text x="65" y="80" dy="4">100</text>
    </g>

    <!-- Y-axis Title -->
    <text x="-310" y="30" transform="rotate(-90)" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">Proportion of Token Batch (%)</text>

    <!-- X-axis Labels -->
    <g font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">
        <text x="200" y="565">Early Pre-training</text>
        <text x="415" y="565">Mid Pre-training</text>
        <text x="630" y="565">Annealing Phase</text>
    </g>

    <!-- Legend -->
    <rect x="780" y="220" width="180" height="135" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="4" filter="url(#shadow)" />
    <g font-family="Arial, sans-serif" font-size="14" fill="#334155">
        <rect x="795" y="235" width="24" height="14" fill="#BDE0FE" stroke="#60A5FA" stroke-width="1.5" />
        <text x="830" y="247" dy="0">General Web Text</text>
        
        <rect x="795" y="265" width="24" height="14" fill="#FDD089" stroke="#F59E0B" stroke-width="1.5" />
        <text x="830" y="277" dy="0">Code Data</text>
        
        <rect x="795" y="295" width="24" height="14" fill="#A7E1C0" stroke="#34D399" stroke-width="1.5" />
        <text x="830" y="307" dy="0">Math Data</text>
        
        <rect x="795" y="325" width="24" height="14" fill="#E3D5F5" stroke="#A78BFA" stroke-width="1.5" />
        <text x="830" y="337" dy="0">Synthetic Data</text>
    </g>
</svg>
