<svg viewBox="0 0 1400 900" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .font-sys { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
            .title-text { font-size: 20px; font-weight: bold; fill: #111827; }
            .header-text { font-size: 18px; font-weight: bold; fill: #111827; }
            .main-text { font-size: 14px; fill: #1f2937; }
            .bold-text { font-size: 14px; font-weight: bold; fill: #111827; }
            .small-text { font-size: 12px; fill: #4b5563; }
            .code-text { font-family: monospace; font-size: 11px; fill: #111827; }
            .code-comment { font-family: monospace; font-size: 11px; fill: #166534; }
            .code-tag { font-family: monospace; font-size: 11px; fill: #1d4ed8; font-weight: bold; }
            
            /* Shadows */
            .shadow { filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.1)); }
            .heavy-shadow { filter: drop-shadow(2px 6px 12px rgba(0, 0, 0, 0.15)); }
        </style>

        <marker id="arrow-main" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a617d" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a826b" />
        </marker>
        <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7caeb8" />
        </marker>
        <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827" />
        </marker>

        <path id="top-arc" d="M 570,450 A 130,130 0 0,1 830,450" fill="none" />
        <path id="bottom-arc" d="M 830,450 A 130,130 0 0,1 570,450" fill="none" />
    </defs>

    <rect width="1400" height="900" fill="#f8fafc" />

    <g transform="translate(700, 450)">
        <circle cx="0" cy="0" r="160" fill="none" stroke="#68a39a" stroke-width="30" />
        <path d="M -20 -145 L 0 -175 L 20 -145 Z" fill="#ffffff" transform="rotate(45)" />
        <path d="M -20 -145 L 0 -175 L 20 -145 Z" fill="#ffffff" transform="rotate(225)" />
        
        <text font-size="16" font-weight="bold" fill="#ffffff" class="font-sys">
            <textPath href="#top-arc" startOffset="50%" text-anchor="middle">Data Production / Model Iteration</textPath>
        </text>
        <text font-size="16" font-weight="bold" fill="#ffffff" class="font-sys">
            <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">Data Production / Model Iteration</textPath>
        </text>

        <circle cx="0" cy="0" r="130" fill="#ffffff" stroke="#2a617d" stroke-width="4" class="shadow" />
        <circle cx="0" cy="0" r="110" fill="#f0f4f8" />
        <path d="M 0 -110 V 110 M -110 0 H 110" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4 4" />
        
        <text x="0" y="-10" class="font-sys title-text" text-anchor="middle">Model Capability</text>
        <text x="0" y="15" class="font-sys title-text" text-anchor="middle">Leap</text>
        <text x="0" y="40" class="font-sys header-text" text-anchor="middle" fill="#374151">(Policy Update)</text>
    </g>


    <rect x="520" y="20" width="360" height="180" fill="#e0ebf5" rx="16" stroke="#b8d4e6" stroke-width="2" />
    <rect x="520" y="20" width="360" height="40" fill="#b8d4e6" rx="16" />
    <rect x="520" y="40" width="360" height="20" fill="#b8d4e6" />
    <text x="700" y="47" class="font-sys header-text" text-anchor="middle">Phase 1: Cold Start SFT (Seed Phase)</text>

    <g transform="translate(620, 80)">
        <polygon points="30,0 40,0 40,20 60,60 10,60 30,20" fill="#e5e7eb" stroke="#2a617d" stroke-width="3" />
        <polygon points="32,25 54,56 16,56" fill="#a4d1b8" />
        <ellipse cx="35" cy="0" rx="10" ry="3" fill="#ffffff" stroke="#2a617d" stroke-width="2" />
        <path d="M 35 35 Q 45 35 45 25 Q 35 25 35 35" fill="#4a826b" stroke="#ffffff" stroke-width="1.5" />
    </g>
    
    <text x="710" y="110" class="font-sys main-text">Input a small amount (thousands)</text>
    <text x="710" y="130" class="font-sys main-text">of curated Long-CoT samples</text>

    <path d="M 860 120 L 920 60" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3 3" />
    <rect x="910" y="20" width="360" height="150" fill="#f8fafc" stroke="#9ca3af" stroke-width="1.5" rx="12" class="shadow" />
    <text x="1090" y="45" class="font-sys bold-text" text-anchor="middle">Highlight &lt;think&gt; tags and parsable format</text>
    
    <rect x="930" y="60" width="320" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="4" />
    <text x="940" y="75" class="code-text">...</text>
    <text x="940" y="90" class="code-tag">&lt;think&gt;</text>
    <rect x="940" y="95" width="280" height="15" fill="#dcfce7" rx="2" />
    <text x="945" y="106" class="code-comment">&lt;!-- Process done/set, Math: ..., Code format --&gt;</text>
    <text x="940" y="122" class="code-tag">&lt;/think&gt;</text>
    
    <text x="1090" y="155" class="font-sys bold-text" text-anchor="middle">Highlight &lt;think&gt; tags and parsable format</text>


    <rect x="920" y="260" width="450" height="360" fill="#e5eedc" rx="16" stroke="#c0daba" stroke-width="2" />
    <rect x="920" y="260" width="450" height="40" fill="#c0daba" rx="16" />
    <rect x="920" y="280" width="450" height="20" fill="#c0daba" />
    <text x="1145" y="287" class="font-sys header-text" text-anchor="middle">Phase 2: Large-Scale RL (Exploration Phase)</text>

    <text x="950" y="340" class="font-sys bold-text">Model explores in massive task pools</text>
    <text x="950" y="360" class="font-sys bold-text">(Math, Code)</text>

    <g transform="translate(930, 400)">
        <path d="M 70 10 L 30 50 M 70 10 L 70 50 M 70 10 L 110 50" stroke="#6b7280" stroke-width="2" />
        <path d="M 30 50 L 10 90 M 30 50 L 30 90 M 30 50 L 50 90" stroke="#6b7280" stroke-width="2" />
        <path d="M 70 50 L 70 90 M 110 50 L 90 90 M 110 50 L 130 90" stroke="#6b7280" stroke-width="2" />
        <circle cx="70" cy="10" r="8" fill="#eab308" stroke="#ca8a04" stroke-width="2" />
        <circle cx="30" cy="50" r="8" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" />
        <circle cx="70" cy="50" r="8" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" />
        <circle cx="110" cy="50" r="8" fill="#eab308" stroke="#ca8a04" stroke-width="2" />
        <circle cx="10" cy="90" r="6" fill="#fca5a5" stroke="#ef4444" stroke-width="2" />
        <circle cx="30" cy="90" r="6" fill="#fca5a5" stroke="#ef4444" stroke-width="2" />
        <circle cx="50" cy="90" r="6" fill="#86efac" stroke="#22c55e" stroke-width="2" />
        <circle cx="70" cy="90" r="6" fill="#86efac" stroke="#22c55e" stroke-width="2" />
        <circle cx="90" cy="90" r="6" fill="#86efac" stroke="#22c55e" stroke-width="2" />
        <circle cx="130" cy="90" r="6" fill="#fca5a5" stroke="#ef4444" stroke-width="2" />
    </g>

    <g transform="translate(1080, 420)">
        <path d="M 10 10 L 40 10 L 70 10 M 10 10 L 40 30 L 70 10 M 10 30 L 40 10 L 70 30 M 10 30 L 40 30 L 70 30" stroke="#4b5563" stroke-width="1" />
        <path d="M 10 50 L 40 30 L 70 50 M 10 50 L 40 50 L 70 50 M 10 30 L 40 50 L 70 30 M 10 50 L 40 10 L 70 50" stroke="#4b5563" stroke-width="1" />
        <circle cx="10" cy="10" r="6" fill="#93c5fd" />
        <circle cx="10" cy="30" r="6" fill="#93c5fd" />
        <circle cx="10" cy="50" r="6" fill="#93c5fd" />
        <circle cx="40" cy="10" r="6" fill="#60a5fa" />
        <circle cx="40" cy="30" r="6" fill="#60a5fa" />
        <circle cx="40" cy="50" r="6" fill="#60a5fa" />
        <circle cx="70" cy="10" r="6" fill="#3b82f6" />
        <circle cx="70" cy="30" r="6" fill="#3b82f6" />
        <circle cx="70" cy="50" r="6" fill="#3b82f6" />
    </g>

    <text x="1050" y="550" class="font-sys bold-text" text-anchor="middle">Diverse Exploration Sampling</text>
    
    <path d="M 1160 410 L 1210 410" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)" />
    <text x="1185" y="400" class="font-sys main-text" text-anchor="middle">Reward</text>
    
    <path d="M 1160 460 L 1210 460" fill="none" stroke="#111827" stroke-width="2" marker-start="url(#arrow-black)" marker-end="url(#arrow-black)" />
    <text x="1185" y="450" class="font-sys main-text" text-anchor="middle">Right / Wrong</text>
    
    <path d="M 1160 510 L 1210 510" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow-black)" />
    <text x="1185" y="500" class="font-sys main-text" text-anchor="middle">Reward</text>

    <text x="1270" y="340" class="font-sys bold-text" text-anchor="middle">Verifier</text>
    <text x="1270" y="550" class="font-sys bold-text" text-anchor="middle">Verifier</text>

    <g transform="translate(1220, 430) scale(1.2)">
        <rect x="30" y="18" width="15" height="10" fill="#9ca3af" stroke="#374151" stroke-width="2" rx="2" />
        <circle cx="20" cy="23" r="14" fill="#cbd5e1" stroke="#374151" stroke-width="2" />
        <circle cx="20" cy="23" r="6" fill="#64748b" />
        <path d="M 28 18 L 35 18 M 28 28 L 35 28" stroke="#374151" stroke-width="2" />
    </g>


    <rect x="850" y="660" width="480" height="150" fill="#e3f0fa" rx="16" stroke="#b8d4e6" stroke-width="2" />
    <text x="870" y="695" class="font-sys header-text">Phase 3: Rejection Sampling (Filtering Phase)</text>
    
    <text x="870" y="730" class="font-sys main-text">Discard: Wrong answers, formatting errors,</text>
    <text x="870" y="750" class="font-sys main-text">logical contradictions</text>
    
    <rect x="1000" y="765" width="310" height="30" fill="#d1fae5" stroke="#34d399" stroke-width="2" rx="4" />
    <text x="1155" y="785" class="font-sys bold-text" text-anchor="middle">Output: Correct process &amp; correct answer</text>

    <g transform="translate(640, 640)">
        <path d="M 10 10 L 110 10 L 75 70 L 75 130 L 45 130 L 45 70 Z" fill="#f1f5f9" stroke="#64748b" stroke-width="4" />
        <ellipse cx="60" cy="10" rx="50" ry="10" fill="#e2e8f0" stroke="#64748b" stroke-width="4" />
        <path d="M 40 -40 L 40 5" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)" />
        <path d="M 60 -40 L 60 5" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)" />
        <path d="M 80 -40 L 80 5" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)" />
        <path d="M 60 140 Q 60 180 120 180" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)" />
        <path d="M 50 140 Q 50 195 120 195" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)" />
    </g>

    <g transform="translate(770, 800)">
        <rect x="0" y="0" width="20" height="25" fill="#ffffff" stroke="#10b981" stroke-width="2" />
        <path d="M 4 6 H 16 M 4 12 H 16 M 4 18 H 10" stroke="#10b981" stroke-width="1.5" />
        
        <rect x="8" y="8" width="20" height="25" fill="#ffffff" stroke="#10b981" stroke-width="2" />
        <path d="M 12 14 H 24 M 12 20 H 24 M 12 26 H 18" stroke="#10b981" stroke-width="1.5" />
    </g>
    <text x="890" y="820" class="font-sys bold-text" text-anchor="middle">Golden Data</text>
    <text x="890" y="840" class="font-sys main-text" text-anchor="middle">(Golden Trajectories)</text>


    <rect x="40" y="260" width="410" height="340" fill="#fcecdb" rx="16" stroke="#fbcfe8" stroke-width="2" />
    <rect x="40" y="260" width="410" height="40" fill="#fed7aa" rx="16" />
    <rect x="40" y="280" width="410" height="20" fill="#fed7aa" />
    <text x="245" y="287" class="font-sys header-text" text-anchor="middle">Phase 4: Round 2 SFT (Solidification Phase)</text>

    <text x="60" y="340" class="font-sys main-text">Remix filtered high-quality reasoning data</text>
    <text x="60" y="360" class="font-sys main-text">with general non-reasoning data (SFT Mix)</text>

    <g transform="translate(60, 410)">
        <rect x="0" y="0" width="35" height="45" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
        <path d="M 6 10 H 29 M 6 20 H 29 M 6 30 H 20" stroke="#3b82f6" stroke-width="2" />
        
        <rect x="15" y="15" width="35" height="45" fill="#ffffff" stroke="#10b981" stroke-width="2" />
        <path d="M 21 25 H 44 M 21 35 H 44 M 21 45 H 35" stroke="#10b981" stroke-width="2" />
        
        <rect x="60" y="0" width="35" height="45" fill="#ffffff" stroke="#10b981" stroke-width="2" />
        <path d="M 66 10 H 89 M 66 20 H 89 M 66 30 H 80" stroke="#10b981" stroke-width="2" />

        <rect x="75" y="15" width="35" height="45" fill="#ffffff" stroke="#f59e0b" stroke-width="2" />
        <path d="M 81 25 H 104 M 81 35 H 104 M 81 45 H 95" stroke="#f59e0b" stroke-width="2" />
    </g>
    
    <rect x="50" y="510" width="130" height="60" fill="#ffedd5" stroke="#fdba74" stroke-width="2" rx="8" />
    <text x="115" y="535" class="font-sys bold-text" text-anchor="middle">Mixing Ratio</text>
    <text x="115" y="555" class="font-sys main-text" text-anchor="middle">(Proportional Mix)</text>

    <path d="M 180 440 L 230 440" fill="none" stroke="#2a617d" stroke-width="4" marker-end="url(#arrow-main)" />

    <g transform="translate(240, 390)">
        <path d="M 0 50 L 0 20 Q 0 0 35 0 Q 70 0 70 20 L 70 50 Z" fill="#9ca3af" stroke="#4b5563" stroke-width="2" />
        <path d="M 10 50 L 10 25 Q 10 10 35 10 Q 60 10 60 25 L 60 50 Z" fill="#111827" />
        <path d="M 35 45 Q 25 35 30 20 Q 35 30 35 25 Q 40 35 45 20 Q 45 35 35 45" fill="#f97316" />
        <path d="M 35 45 Q 30 40 32 30 Q 35 38 35 35 Q 38 40 40 30 Q 40 40 35 45" fill="#fef08a" />
        <rect x="-10" y="50" width="90" height="15" fill="#6b7280" stroke="#4b5563" stroke-width="2" />

        <g transform="translate(85, 0)">
            <rect x="0" y="10" width="50" height="55" fill="#cbd5e1" stroke="#4b5563" stroke-width="2" rx="4" />
            <line x1="5" y1="25" x2="45" y2="25" stroke="#4b5563" stroke-width="2" />
            <line x1="5" y1="40" x2="45" y2="40" stroke="#4b5563" stroke-width="2" />
            <line x1="5" y1="55" x2="45" y2="55" stroke="#4b5563" stroke-width="2" />
            
            <circle cx="15" cy="18" r="3" fill="#10b981" />
            <circle cx="15" cy="33" r="3" fill="#10b981" />
            <circle cx="15" cy="48" r="3" fill="#10b981" />
            
            <path d="M 55 20 A 15 5 0 0 0 85 20 L 85 60 A 15 5 0 0 1 55 60 Z" fill="#93c5fd" stroke="#1e3a8a" stroke-width="1.5" />
            <ellipse cx="70" cy="20" rx="15" ry="5" fill="#bfdbfe" stroke="#1e3a8a" stroke-width="1.5" />
            <path d="M 55 35 A 15 5 0 0 0 85 35" fill="none" stroke="#1e3a8a" stroke-width="1.5" />
            <path d="M 55 50 A 15 5 0 0 0 85 50" fill="none" stroke="#1e3a8a" stroke-width="1.5" />
        </g>
    </g>

    <text x="320" y="500" class="font-sys bold-text" text-anchor="middle">Solidify into new generation</text>
    <text x="320" y="520" class="font-sys bold-text" text-anchor="middle">model weights</text>


    <path d="M 870 200 Q 1000 240 940 330" fill="none" stroke="#2a617d" stroke-width="14" marker-end="url(#arrow-main)" />
    <text x="950" y="220" class="font-sys bold-text" transform="rotate(0, 960, 220)">First Push: Logic Template</text>
    
    <path d="M 1060 620 Q 980 720 890 640" fill="none" stroke="#2a617d" stroke-width="14" marker-end="url(#arrow-main)" />

    <path d="M 550 780 Q 380 780 390 620" fill="none" stroke="#2a617d" stroke-width="14" marker-end="url(#arrow-main)" />

    <path d="M 450 320 Q 420 180 540 130" fill="none" stroke="#2a617d" stroke-width="14" marker-end="url(#arrow-main)" />


    <g transform="translate(10, 80)">
        <path d="M 320 140 Q 380 120 460 70" fill="none" stroke="#7caeb8" stroke-width="16" marker-end="url(#arrow-teal)" />
        <rect x="40" y="0" width="380" height="90" fill="#f8fafc" opacity="0.8" />
        <text x="240" y="30" class="font-sys header-text" text-anchor="middle">After Round 2 SFT</text>
        <text x="240" y="55" class="font-sys title-text" text-anchor="middle">Stronger model as next RL starting point</text>
        <text x="240" y="80" class="font-sys header-text" text-anchor="middle">(Policy Model)</text>
    </g>

    <g transform="translate(50, 710)">
        <path d="M 400 120 Q 450 80 440 20" fill="none" stroke="#7caeb8" stroke-width="16" marker-end="url(#arrow-teal)" />
        <rect x="0" y="100" width="400" height="90" fill="#e0f2fe" opacity="0.6" rx="10" />
        <text x="200" y="130" class="font-sys header-text" text-anchor="middle">After Round 2 SFT</text>
        <text x="200" y="155" class="font-sys title-text" text-anchor="middle">Stronger model as next RL starting point</text>
        <text x="200" y="180" class="font-sys header-text" text-anchor="middle">(Policy Model)</text>
    </g>

</svg>
