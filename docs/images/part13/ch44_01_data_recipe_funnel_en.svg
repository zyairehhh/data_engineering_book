<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="22" fill="#333333" text-anchor="middle">Figure 44-1: Data Recipe Funnel</text>
    <text x="400" y="75" font-family="Arial, sans-serif" font-size="18" fill="#555555" text-anchor="middle">(From PR to Engineering)</text>

    <!-- Shadows -->
    <g fill="#E6E6E6">
        <polygon points="112,132 712,132 652,232 172,232" />
        <polygon points="181,247 643,247 583,347 241,347" />
        <polygon points="250,362 574,362 514,462 310,462" />
        <polygon points="310,477 514,477 514,577 310,577" />
    </g>

    <!-- Layers -->
    <polygon points="100,120 700,120 640,220 160,220" fill="#DCE8F4" stroke="#ffffff" stroke-width="1"/>
    <polygon points="169,235 631,235 571,335 229,335" fill="#B0CBE1" stroke="#ffffff" stroke-width="1"/>
    <polygon points="238,350 562,350 502,450 298,450" fill="#86AED0" stroke="#ffffff" stroke-width="1"/>
    <polygon points="298,465 502,465 502,565 298,565" fill="#6295C0" stroke="#ffffff" stroke-width="1"/>

    <!-- Text styling -->
    <g font-family="Arial, sans-serif" text-anchor="middle">
        <!-- Level 1 (Dark text) -->
        <text x="400" y="165" font-size="16" fill="#333333">Technical Reports</text>
        <text x="400" y="185" font-size="14" fill="#555555">(e.g., "14.8T Tokens")</text>

        <!-- Level 2 (Dark text) -->
        <text x="400" y="280" font-size="16" fill="#333333">Inferred Ratios</text>
        <text x="400" y="300" font-size="14" fill="#555555">(e.g., "~20% Code")</text>

        <!-- Level 3 (White text) -->
        <text x="400" y="395" font-size="16" fill="#FFFFFF">Mixture Design</text>
        <text x="400" y="415" font-size="14" fill="#F8FAFC">(Domain/Language Splits)</text>

        <!-- Level 4 (White text) -->
        <text x="400" y="510" font-size="16" fill="#FFFFFF">Engineering Actions</text>
        <text x="400" y="530" font-size="14" fill="#F8FAFC">(Cleaning/Filter Scripts)</text>
    </g>
</svg>
