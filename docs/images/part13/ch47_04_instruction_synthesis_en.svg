<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#F4F8FB" />
    
    <!-- Title -->
    <text x="500" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#000000" text-anchor="middle">Multimodal Instruction Synthesis Pipeline</text>

    <!-- Column 1: Input Sources -->
    <rect x="80" y="140" width="180" height="460" rx="8" fill="#A1CFE8" />
    <g font-family="Arial, sans-serif" font-size="22" fill="#000000" text-anchor="middle">
        <text x="170" y="190">Input</text>
        <text x="170" y="220">Sources</text>
    </g>
    <!-- Col 1 Items -->
    <rect x="100" y="270" width="140" height="80" rx="6" fill="#E8F4FA" stroke="#89C0DB" stroke-width="2" />
    <rect x="100" y="390" width="140" height="80" rx="6" fill="#E8F4FA" stroke="#89C0DB" stroke-width="2" />
    <g font-family="Arial, sans-serif" font-size="18" fill="#000000" text-anchor="middle">
        <text x="170" y="316">Seed Images</text>
        <text x="170" y="423">Perception</text>
        <text x="170" y="447">Models</text>
    </g>

    <!-- Column 2: Textual Representation -->
    <rect x="300" y="140" width="180" height="460" rx="8" fill="#A3D5A1" />
    <g font-family="Arial, sans-serif" font-size="22" fill="#000000" text-anchor="middle">
        <text x="390" y="190">Textual</text>
        <text x="390" y="220">Representation</text>
    </g>
    <!-- Col 2 Items -->
    <rect x="320" y="250" width="140" height="80" rx="6" fill="#E9F6E8" stroke="#8DC88B" stroke-width="2" />
    <rect x="320" y="350" width="140" height="80" rx="6" fill="#E9F6E8" stroke="#8DC88B" stroke-width="2" />
    <rect x="320" y="450" width="140" height="80" rx="6" fill="#E9F6E8" stroke="#8DC88B" stroke-width="2" />
    <g font-family="Arial, sans-serif" font-size="18" fill="#000000" text-anchor="middle">
        <text x="390" y="283">BBoxes to</text>
        <text x="390" y="307">JSON</text>
        
        <text x="390" y="396">OCR to text</text>
        
        <text x="390" y="483">Depth to</text>
        <text x="390" y="507">spatial desc</text>
    </g>

    <!-- Column 3: LLM Instruction Generator -->
    <rect x="520" y="140" width="180" height="460" rx="8" fill="#F3C79A" />
    <g font-family="Arial, sans-serif" font-size="22" fill="#000000" text-anchor="middle">
        <text x="610" y="190">LLM Instruction</text>
        <text x="610" y="220">Generator</text>
    </g>
    <!-- Col 3 Items -->
    <rect x="540" y="250" width="140" height="80" rx="6" fill="#FDF3E6" stroke="#E3B27D" stroke-width="2" />
    <rect x="540" y="350" width="140" height="80" rx="6" fill="#FDF3E6" stroke="#E3B27D" stroke-width="2" />
    <rect x="540" y="450" width="140" height="80" rx="6" fill="#FDF3E6" stroke="#E3B27D" stroke-width="2" />
    <g font-family="Arial, sans-serif" font-size="18" fill="#000000" text-anchor="middle">
        <text x="610" y="283">Complex</text>
        <text x="610" y="307">reasoning Q&amp;A</text>
        
        <text x="610" y="396">Visual math</text>
        
        <text x="610" y="496">Multi-hop</text>
    </g>

    <!-- Column 4: Quality Filter -->
    <rect x="740" y="140" width="180" height="460" rx="8" fill="#F1A5B6" />
    <g font-family="Arial, sans-serif" font-size="22" fill="#000000" text-anchor="middle">
        <text x="830" y="205">Quality Filter</text>
    </g>
    <!-- Col 4 Items -->
    <rect x="760" y="250" width="140" height="80" rx="6" fill="#FDE7EB" stroke="#DF8A9D" stroke-width="2" />
    <rect x="760" y="350" width="140" height="80" rx="6" fill="#FDE7EB" stroke="#DF8A9D" stroke-width="2" />
    <rect x="760" y="450" width="140" height="80" rx="6" fill="#FDE7EB" stroke="#DF8A9D" stroke-width="2" />
    <g font-family="Arial, sans-serif" font-size="18" fill="#000000" text-anchor="middle">
        <text x="830" y="283">Self-consistency</text>
        <text x="830" y="307">voting</text>
        
        <text x="830" y="396">LLM-as-Judge</text>
        
        <text x="830" y="496">CLIP-Score</text>
    </g>

    <!-- Connective Arrows -->
    <line x1="260" y1="390" x2="295" y2="390" stroke="#555555" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="480" y1="390" x2="515" y2="390" stroke="#555555" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="700" y1="390" x2="735" y2="390" stroke="#555555" stroke-width="3" marker-end="url(#arrow)" />
    
    <!-- Down Arrow to Final Box -->
    <line x1="830" y1="600" x2="830" y2="645" stroke="#555555" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Final Box: Dataset -->
    <rect x="730" y="650" width="200" height="110" rx="6" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="2" filter="url(#shadow)" />
    <g font-family="Arial, sans-serif" font-size="22" fill="#000000" text-anchor="middle">
        <text x="830" y="683">High-Quality</text>
        <text x="830" y="713">MM Instruction</text>
        <text x="830" y="743">Dataset</text>
    </g>
</svg>
