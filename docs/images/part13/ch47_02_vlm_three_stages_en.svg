<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660">
    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8CA3B6" />
        </marker>
        <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
        </marker>
        <marker id="arrow-black-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 10 0 L 0 5 L 10 10 z" fill="#000000" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <!-- Title -->
    <g font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#000000" text-anchor="middle">
        <text x="450" y="50">3-Stage Vision-Language Model</text>
        <text x="450" y="90">Data Engineering Pipeline</text>
    </g>

    <!-- Cards -->
    <rect x="35" y="130" width="250" height="400" rx="10" fill="#D2E3F4" />
    <rect x="325" y="130" width="250" height="400" rx="10" fill="#C9E6CE" />
    <rect x="615" y="130" width="250" height="400" rx="10" fill="#F4CF90" />

    <!-- Card Headers -->
    <g font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">
        <!-- Card 1 -->
        <text x="160" y="180">Stage 1:</text>
        <text x="160" y="210">Pre-Training</text>
        <text x="160" y="240">Feature Alignment</text>
        
        <!-- Card 2 -->
        <text x="450" y="180">Stage 2:</text>
        <text x="450" y="210">Multi-Task</text>
        <text x="450" y="240">Hi-Res Alignment</text>
        
        <!-- Card 3 -->
        <text x="740" y="180">Stage 3:</text>
        <text x="740" y="210">Supervised</text>
        <text x="740" y="240">Fine-Tuning (SFT)</text>
    </g>

    <!-- Card Contents -->
    <g font-family="Arial, sans-serif" font-size="20" fill="#000000">
        <!-- Card 1 -->
        <circle cx="55" cy="303" r="4" fill="#000000" />
        <text x="70" y="310">Billions of image-</text>
        <text x="70" y="336">text pairs</text>

        <circle cx="55" cy="383" r="4" fill="#000000" />
        <text x="70" y="390">LAION-5B,</text>
        <text x="70" y="416">DataComp</text>

        <circle cx="55" cy="463" r="4" fill="#000000" />
        <text x="70" y="470">Freeze LLM, train</text>
        <text x="70" y="496">Projector</text>

        <!-- Card 2 -->
        <circle cx="345" cy="303" r="4" fill="#000000" />
        <text x="360" y="310">Tens of millions</text>
        <text x="360" y="336">of samples</text>

        <circle cx="345" cy="383" r="4" fill="#000000" />
        <text x="360" y="390">OCR-Rich,</text>
        <text x="360" y="416">DocVQA, ChartQA</text>

        <circle cx="345" cy="463" r="4" fill="#000000" />
        <text x="360" y="470">Dynamic</text>
        <text x="360" y="496">resolution</text>
        <text x="360" y="522">bucketing</text>

        <!-- Card 3 -->
        <circle cx="635" cy="303" r="4" fill="#000000" />
        <text x="650" y="310">100K - 1M high-</text>
        <text x="650" y="336">quality samples</text>

        <circle cx="635" cy="383" r="4" fill="#000000" />
        <text x="650" y="390">Complex visual</text>
        <text x="650" y="416">reasoning</text>

        <circle cx="635" cy="463" r="4" fill="#000000" />
        <text x="650" y="470">GPT-4V</text>
        <text x="650" y="496">distillation</text>
    </g>

    <!-- Connective Arrows -->
    <line x1="290" y1="330" x2="315" y2="330" stroke="#8CA3B6" stroke-width="4" marker-end="url(#arrow-grey)" />
    <line x1="580" y1="330" x2="605" y2="330" stroke="#8CA3B6" stroke-width="4" marker-end="url(#arrow-grey)" />

    <!-- Bottom Bidirectional Arrow -->
    <line x1="50" y1="580" x2="850" y2="580" stroke="#000000" stroke-width="4" marker-start="url(#arrow-black-rev)" marker-end="url(#arrow-black)" />
    
    <!-- Bottom Text -->
    <g font-family="Arial, sans-serif" font-size="22" fill="#000000">
        <text x="50" y="620" text-anchor="start">Data Volume Decreasing</text>
        <text x="850" y="620" text-anchor="end">Quality Requirement Increasing</text>
    </g>
</svg>
