<svg viewBox="0 0 1100 650" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .font-sys { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
            .box-title { font-size: 16px; font-weight: bold; fill: #111827; }
            .main-text { font-size: 15px; fill: #1f2937; }
            .bold-text { font-size: 15px; font-weight: bold; fill: #111827; }
            .tag-text { font-family: monospace; font-size: 18px; fill: #111827; }
            
            /* Shadows for depth */
            .shadow { filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.05)); }
        </style>

        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b95c9" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#79a366" />
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d99252" />
        </marker>
    </defs>

    <rect width="1100" height="650" fill="#ffffff" />

    <text x="65" y="25" class="tag-text">&lt;think&gt;</text>
    <text x="65" y="615" class="tag-text">&lt;/think&gt;</text>

    <rect x="90" y="40" width="30" height="540" fill="#f3f4f6" />

    <g stroke="#374151" stroke-width="1.5">
        <rect x="50" y="40" width="40" height="150" fill="#90afdb" />
        <rect x="50" y="190" width="40" height="170" fill="#99be7b" />
        <rect x="50" y="360" width="40" height="140" fill="#f4b183" />
        <rect x="50" y="500" width="40" height="80" fill="#d1d5db" />
    </g>

    <g>
        <rect x="120" y="40" width="20" height="150" fill="#d0def0" />
        <rect x="120" y="190" width="20" height="170" fill="#dce8d2" />
        <rect x="120" y="360" width="20" height="140" fill="#fce4d6" />
        <rect x="120" y="500" width="20" height="80" fill="#e7e6e6" />
    </g>

    <polygon points="120,420 120,440 95,440 95,450 70,430 95,410 95,420" fill="#f97316" stroke="#431407" stroke-width="1.5" />


    <path d="M 145 50 L 160 50 L 160 180 L 145 180 M 160 115 L 255 115" fill="none" stroke="#6b95c9" stroke-width="2" marker-end="url(#arrow-blue)" />

    <path d="M 145 200 L 160 200 L 160 350 L 145 350 M 160 275 L 255 275" fill="none" stroke="#79a366" stroke-width="2" marker-end="url(#arrow-green)" />

    <path d="M 145 370 L 160 370 L 160 490 L 145 490 M 160 430 L 255 430" fill="none" stroke="#d99252" stroke-width="2" marker-end="url(#arrow-orange)" />


    <rect x="270" y="50" width="800" height="130" fill="#e9f0f8" stroke="#6b95c9" stroke-width="1.5" rx="4" class="shadow" />
    <text x="290" y="80" class="font-sys box-title">Pattern 1: Self-Reflection (Reflection)</text>
    <text x="290" y="110" class="font-sys main-text">"Wait, my previous assumption (assuming the denominator is non-zero) might not hold under</text>
    <text x="290" y="132" class="font-sys main-text">boundary conditions. I need to re-verify the interval range."</text>
    <text x="290" y="160" class="font-sys main-text"><tspan class="bold-text">Function:</tspan> Demonstrates the model's ability to re-evaluate its own thinking process.</text>

    <rect x="270" y="200" width="800" height="150" fill="#ebf2e8" stroke="#79a366" stroke-width="1.5" rx="4" class="shadow" />
    <text x="290" y="230" class="font-sys box-title">Pattern 2: Self-Correction / Verification (Verification)</text>
    <text x="290" y="260" class="font-sys main-text">"Substitute x = 2 into the left side of the original equation, getting 4 + 2 = 6; substitute into</text>
    <text x="290" y="282" class="font-sys main-text">the right side, getting 3 × 2 = 6. Both sides are equal, the interim conclusion is correct."</text>
    <text x="290" y="315" class="font-sys main-text"><tspan class="bold-text">Function:</tspan> Demonstrates the model actively seeking Ground Truth signals to support its logic chain</text>
    <text x="290" y="337" class="font-sys main-text">and prevent error accumulation.</text>

    <rect x="270" y="370" width="800" height="150" fill="#fceddf" stroke="#d99252" stroke-width="1.5" rx="4" class="shadow" />
    <text x="290" y="400" class="font-sys box-title">Pattern 3: Backtrack / Correction (Backtrack)</text>
    <text x="290" y="430" class="font-sys main-text">"Through the previous verification, the algebraic method is too complex for solving this</text>
    <text x="290" y="452" class="font-sys main-text">geometry problem. I should backtrack to step three and try using auxiliary lines."</text>
    <text x="290" y="485" class="font-sys main-text"><tspan class="bold-text">Function:</tspan> A signature behavior distinguishing Long-CoT from standard CoT, showing the model's</text>
    <text x="290" y="507" class="font-sys main-text">resilience to explore alternative paths when hitting a 'dead end'.</text>

</svg>
